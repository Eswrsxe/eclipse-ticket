<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EclipsePoké - Meus Tickets</title>
    <style>
        :root {
            --bg-color: #111214;
            --card-bg: #1e1f22;
            --primary: #9D4EDD;
            --text-main: #f2f3f5;
            --text-muted: #949ba4;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background-color: var(--card-bg);
            width: 100%;
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .container {
            max-width: 800px;
            width: 90%;
            margin-top: 40px;
        }
        .login-box {
            text-align: center;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        .btn-discord {
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn-discord:hover { background-color: #4752C4; }
        
        .dashboard { display: none; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .user-info img { border-radius: 50%; width: 60px; height: 60px; border: 2px solid var(--primary); }
        
        .ticket-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .ticket-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }
        .ticket-card:hover { transform: translateX(5px); }
        .ticket-title { font-size: 18px; font-weight: bold; margin: 0; }
        .ticket-link {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
        }
        .loader { text-align: center; font-size: 20px; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌘 EclipsePoké | Central de Tickets</h1>
    </div>

    <div class="container">
        <div id="login-section" class="login-box">
            <h2>Bem-vindo ao Histórico de Atendimento</h2>
            <p style="color: var(--text-muted)">Faça login com o Discord para visualizar os tickets que você abriu no servidor.</p>
            <a id="btn-login" href="#" class="btn-discord">Logar com Discord</a>
        </div>

        <div id="dashboard-section" class="dashboard">
            <div class="user-info">
                <img id="user-avatar" src="" alt="Avatar">
                <div>
                    <h2 style="margin: 0;" id="user-name">Carregando...</h2>
                    <p style="margin: 0; color: var(--text-muted);" id="user-role"></p>
                </div>
            </div>

            <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px;">Meus Atendimentos Encerrados</h3>
            <div id="loading" class="loader">Buscando seus tickets nos arquivos... ⏳</div>
            <div id="ticket-container" class="ticket-list"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔧 CONFIGURAÇÕES (PREENCHA AQUI!)
        // ==========================================
        const CLIENT_ID = 'COLE_SEU_CLIENT_ID_AQUI'; 
        const GITHUB_USER = 'Eswrsxe';
        const GITHUB_REPO = 'eclipse-ticket';
        // IDs dos membros da Staff que podem ver TODOS os tickets
        const ADMIN_IDS = ['1471643010470117418', '1516526095623651371']; 

        // ==========================================
        // LÓGICA DO SITE
        // ==========================================
        const redirectUri = window.location.href.split('#')[0]; // Pega a URL atual do site
        const loginUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify`;
        
        document.getElementById('btn-login').href = loginUrl;

        // Verifica se a pessoa acabou de voltar do login do Discord com o Token na URL
        const fragment = new URLSearchParams(window.location.hash.slice(1));
        const accessToken = fragment.get('access_token');

        if (accessToken) {
            // Esconde a tela de login e mostra o painel
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';

            // 1. Puxa os dados do Discord do usuário logado
            fetch('https://discord.com/api/users/@me', {
                headers: { authorization: `Bearer ${accessToken}` }
            })
            .then(result => result.json())
            .then(user => {
                const avatarUrl = user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png';
                document.getElementById('user-avatar').src = avatarUrl;
                document.getElementById('user-name').innerText = user.global_name || user.username;
                
                const isAdmin = ADMIN_IDS.includes(user.id);
                document.getElementById('user-role').innerText = isAdmin ? '👑 Administrador (Acesso a todos os tickets)' : 'Membro';

                // 2. Puxa a lista de arquivos do repositório do GitHub
                fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`)
                .then(res => res.json())
                .then(files => {
                    document.getElementById('loading').style.display = 'none';
                    const ticketContainer = document.getElementById('ticket-container');
                    
                    // Filtra apenas arquivos HTML que começam com "log_"
                    const ticketsValidos = files.filter(f => f.name.endsWith('.html') && f.name.startsWith('log_'));
                    
                    // Se for admin, vê tudo. Se não, filtra só os que tem o ID do usuário no nome
                    const meusTickets = isAdmin ? ticketsValidos : ticketsValidos.filter(f => f.name.includes(`_${user.id}_`));

                    if (meusTickets.length === 0) {
                        ticketContainer.innerHTML = '<p style="color: #ff6b6b;">Nenhum ticket encontrado para esta conta.</p>';
                        return;
                    }

                    // Cria os botões na tela para cada ticket
                    meusTickets.forEach(ticket => {
                        // Limpa o nome do arquivo para ficar bonito na tela (Ex: tira o log_, o ID e o .html)
                        let nomeLimpo = ticket.name.replace('.html', '').split('_');
                        nomeLimpo = nomeLimpo[nomeLimpo.length - 1]; // Pega só a última parte (ticket-comprar-guara)

                        const card = document.createElement('div');
                        card.className = 'ticket-card';
                        card.innerHTML = `
                            <p class="ticket-title">📄 ${nomeLimpo.toUpperCase()}</p>
                            <a href="${ticket.name}" class="ticket-link" target="_blank">Ler Transcrição</a>
                        `;
                        ticketContainer.appendChild(card);
                    });
                })
                .catch(err => {
                    document.getElementById('loading').innerText = '❌ Erro ao buscar os tickets no banco de dados.';
                });
            })
            .catch(console.error);
        }
    </script>
</body>
</html>
